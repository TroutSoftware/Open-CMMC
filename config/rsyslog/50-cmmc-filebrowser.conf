## CMMC-Filebrowser audit forwarder — rsyslog drop-in.
##
## Reads filebrowser's JSON audit events off journald (where the
## systemd unit pipes them), parses each JSON record, and forwards
## to the customer SIEM over mTLS using the OpenSSL stream driver —
## which on RHEL 9 inherits Red Hat's FIPS 140-3 validated OpenSSL
## module. That is the load-bearing link for CMMC 3.13.8 / 3.13.11
## on the audit transport.
##
## Required RPM packages (install once on the host):
##
##   sudo dnf install -y rsyslog rsyslog-openssl \
##       rsyslog-mmjsonparse rsyslog-mmnormalize
##
## Install this file:
##
##   sudo install -m 0644 50-cmmc-filebrowser.conf /etc/rsyslog.d/
##   sudo rsyslogd -N1                       # syntax validate
##   sudo systemctl restart rsyslog
##
## CMMC controls satisfied:
##   3.3.1   create/retain audit records (durable forward to SIEM)
##   3.3.2   traceability (user_id + correlation_id in JSON payload)
##   3.3.5   correlate (correlation_id preserved end-to-end)
##   3.3.8   protect audit info (mTLS + FIPS ciphers)
##   3.13.8  crypto for CUI-adjacent data in transit
##
## Per-deployment values below are marked with ⟪ REPLACE ⟫. Each is
## parsed at config-load time — rsyslog does not support message-
## property substitution in action parameters, so operators replace
## these literals at deploy time (recommended: Ansible/Terraform
## template, or a separate /etc/rsyslog.d/49-cmmc-vars.conf not
## committed to this repo).

# --- modules ---------------------------------------------------------------

# imjournal state tracked absolutely — some immutable / atomic RHEL
# variants do not have rsyslog's default $WorkDirectory (/var/lib/rsyslog)
# present at boot; the absolute path fails loud if missing rather than
# silently rolling forward from an empty state.
#
# Ratelimit capped at a high-but-finite value rather than "0" so a
# compromised filebrowser cannot DoS the audit subsystem. The cap of
# 50,000 events per 60 seconds accommodates a 1000-user deployment
# auditing every file.read (~30k events/min) with headroom. Raise
# Ratelimit.Burst for larger deployments.
#
# IMPORTANT: journald ITSELF rate-limits by default. For this rsyslog
# config to receive high-volume audit bursts, /etc/systemd/journald.conf
# MUST also set RateLimitIntervalSec=0 (or a matching high cap). See
# docs/audit-forwarder.md §journald tuning.
module(load="imjournal"
       StateFile="/var/lib/rsyslog/imjournal.state"
       Ratelimit.Interval="60"
       Ratelimit.Burst="50000")

# mmjsonparse runs on every message as a parse-validation step.
# Failures surface in rsyslog's own error stream (parse errors are
# cheap signal that a process is emitting malformed JSON). The
# CMMCJSON template below forwards the raw MESSAGE (not the parsed
# structure) so the SIEM has the full original line and re-parses
# on its side — matches how most SIEM integrations are documented.
module(load="mmjsonparse")
module(load="omfwd")

# --- output template -------------------------------------------------------
#
# Emit RFC5424 structured syslog with the parsed JSON payload as the
# MSG. Most SIEMs (Splunk HEC via RELP, Sentinel AMA syslog, Elastic
# Agent syslog listener) accept this shape directly.

template(name="CMMCJSON" type="list") {
    constant(value="<")
    property(name="pri")
    constant(value=">1 ")
    property(name="timereported" dateFormat="rfc3339")
    constant(value=" ")
    property(name="hostname")
    constant(value=" cmmc-filebrowser - - - ")
    property(name="msg" spifno1stsp="on" droplastlf="on")
    constant(value="\n")
}

# --- ruleset ---------------------------------------------------------------

if ($programname == "cmmc-filebrowser") then {

    # Parse the JSON body. mmjsonparse with cookie="" tells rsyslog the
    # message starts with a bare JSON object (no "@cee:" prefix) —
    # filebrowser's JSONEmitter writes exactly that shape.
    action(type="mmjsonparse" cookie="")

    # Forward via OpenSSL (= RHEL FIPS 140-3 module on RHEL 9 FIPS mode).
    # mTLS with peer-cert pinning: SIEM must present a cert chaining to
    # the configured CAFile AND matching StreamDriverPermittedPeers in
    # its subject CN. Queue is disk-assisted so a SIEM outage does not
    # drop events — rsyslog spools locally and replays.
    action(
        name="cmmc-forward-siem"
        type="omfwd"
        target="siem.enclave.internal"              # ⟪ REPLACE ⟫ SIEM hostname or IP
        port="6514"                                 # ⟪ REPLACE if your SIEM uses a different TLS syslog port ⟫
        protocol="tcp"
        template="CMMCJSON"

        # TLS
        StreamDriver="ossl"
        StreamDriverMode="1"
        StreamDriverAuthMode="x509/name"
        StreamDriverPermittedPeers="siem.enclave.internal"   # ⟪ REPLACE ⟫ expected peer cert CN
        streamdriver.CAFile="/etc/pki/cmmc/ca.pem"
        streamdriver.CertFile="/etc/pki/cmmc/client.pem"
        streamdriver.KeyFile="/etc/pki/cmmc/client.key"

        # Queue (resilience vs SIEM outage — 3.3.4 audit-failure
        # handling: spool locally, retry forever, alert on queue-full
        # via SIEM-side heartbeat monitoring of this forwarder).
        queue.type="LinkedList"
        queue.filename="cmmc_fwd_queue"
        queue.spoolDirectory="/var/spool/rsyslog"
        queue.size="100000"
        queue.saveOnShutdown="on"
        queue.maxDiskSpace="1g"
        action.resumeRetryCount="-1"
    )

    # Stop further processing so audit events do not also land in
    # /var/log/messages (which is not protected at the same level).
    stop
}
