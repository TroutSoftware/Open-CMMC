<!--
  CMMC endpoint agent config — Linux (RHEL 9 / Alma 9 / Ubuntu 22.04+).
  Deploy to: /var/ossec/etc/ossec.conf
  See docs/wazuh-endpoint-agents.md for context.
-->
<ossec_config>

  <client>
    <server>
      <address>wazuh.customer.internal</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- Auth + sudo events. Only ONE of these files exists per
       distro (RHEL/Alma: /var/log/secure, Debian/Ubuntu:
       /var/log/auth.log). Leaving both localfile blocks in will
       spam ossec.log with "Could not open file" errors on
       whichever path is absent. Comment out the wrong one for
       your distro before deploying. -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/secure</location>
  </localfile>
  <!--
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>
  -->
  <!-- NB: journald (below) also captures PAM/sshd events on
       systemd distros, so if syslog forwarding to /var/log/*.log
       is disabled the journald reader still gives 3.5.x coverage. -->

  <!-- Linux audit subsystem — captures execve + file access when
       auditd is running with a CMMC-appropriate ruleset. -->
  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <!-- journald as a catch-all for systemd-unit events. -->
  <localfile>
    <log_format>journald</log_format>
    <location>journald</location>
  </localfile>

  <!-- FIM on CUI-adjacent paths. $HOME expansion is NOT supported
       in ossec.conf — enumerate explicit paths or templatize this
       file per user during provisioning.

       Realtime FIM on /home registers one inotify watch per
       subdirectory. On a dev laptop with a node_modules tree this
       can exhaust fs.inotify.max_user_watches (default 8192).
       Bump via:
         sudo sysctl fs.inotify.max_user_watches=524288
         echo "fs.inotify.max_user_watches=524288" | \
             sudo tee /etc/sysctl.d/90-wazuh-inotify.conf
       or drop realtime="yes" to fall back to scheduled scans. -->
  <syscheck>
    <frequency>21600</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <directories check_all="yes" realtime="yes">/home</directories>
    <directories check_all="yes">/etc</directories>
    <directories check_all="yes">/usr/local/bin</directories>
    <directories check_all="yes">/usr/bin</directories>
    <directories check_all="yes">/usr/sbin</directories>
    <directories check_all="yes">/bin</directories>
    <directories check_all="yes">/sbin</directories>
    <directories check_all="yes">/boot</directories>

    <!-- Noise suppression. -->
    <ignore>/var/ossec</ignore>
    <ignore>/home/*/.cache</ignore>
    <ignore>/home/*/.local/share/Trash</ignore>
    <ignore type="sregex">.log$</ignore>
    <ignore type="sregex">.tmp$</ignore>
    <ignore type="sregex">.swp$</ignore>
  </syscheck>

  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
  </rootcheck>

  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>6h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>

  <wodle name="command">
    <disabled>yes</disabled>
    <!-- Custom commands intentionally off. Enable per-site with
         deliberate policy review. -->
  </wodle>

</ossec_config>
