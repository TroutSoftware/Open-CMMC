<!--
  CMMC endpoint agent config — macOS (Monterey 12+).
  Deploy to: /Library/Ossec/etc/ossec.conf
  See docs/wazuh-endpoint-agents.md for context.
-->
<ossec_config>

  <client>
    <server>
      <address>wazuh.customer.internal</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- Classic system logs. -->
  <localfile>
    <log_format>macos</log_format>
    <location>macos</location>
    <query>process == "sudo" OR process == "sshd" OR process == "loginwindow" OR process == "com.apple.xpc.launchd"</query>
  </localfile>

  <!-- Install + app-store events. -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/install.log</location>
  </localfile>
  <!-- General system events (kernel, daemons). Rotation happens
       daily via newsyslog; agent handles rotation. -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/system.log</location>
  </localfile>

  <!-- FIM on user dirs + system dirs. macOS agent resolves $HOME
       per-user but config is agent-scoped; enumerate explicit
       user paths during provisioning or use Jamf to template. -->
  <syscheck>
    <frequency>21600</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <directories check_all="yes" realtime="yes">/Users</directories>
    <directories check_all="yes">/Applications</directories>
    <directories check_all="yes">/usr/local/bin</directories>
    <directories check_all="yes">/etc</directories>

    <!-- macOS SIP covers /System — drift there is handled by Apple. -->
    <ignore>/System</ignore>
    <!-- Agent self. -->
    <ignore>/Library/Ossec</ignore>
    <!-- Caches / trash. -->
    <ignore>/Users/*/Library/Caches</ignore>
    <ignore>/Users/*/.Trash</ignore>
    <ignore type="sregex">.log$</ignore>
    <ignore type="sregex">.tmp$</ignore>
  </syscheck>

  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
  </rootcheck>

  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>6h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>

</ossec_config>
