<!--
  CMMC endpoint agent config — Windows 10 / 11.
  Deploy to: C:\Program Files (x86)\ossec-agent\ossec.conf
  See docs/wazuh-endpoint-agents.md for context.
-->
<ossec_config>

  <client>
    <server>
      <address>wazuh.customer.internal</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- EventLog channels relevant to 3.5.x / 3.1.x / 3.14.x -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Security</location>
  </localfile>
  <localfile>
    <log_format>eventchannel</log_format>
    <location>System</location>
  </localfile>
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Application</location>
  </localfile>
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-Sysmon/Operational</location>
  </localfile>
  <!-- Windows Defender events — 3.14.2 malicious code detection
       evidence. Without this channel the 3.14.2 claim in the doc
       is not supported by endpoint data. -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-Windows Defender/Operational</location>
  </localfile>

  <!-- File integrity monitoring on typical CUI-landing paths.
       Uses %USERPROFILE% expansion on recent Windows agents. -->
  <syscheck>
    <frequency>21600</frequency>
    <scan_on_start>yes</scan_on_start>
    <directories check_all="yes" realtime="yes">%USERPROFILE%\Documents</directories>
    <directories check_all="yes" realtime="yes">%USERPROFILE%\Downloads</directories>
    <directories check_all="yes" realtime="yes">%USERPROFILE%\Desktop</directories>
    <!-- OneDrive watched in realtime so 3.13.4 data-transfer
         evidence is present for transfers that happen + revert
         faster than the 6h scheduled scan. -->
    <directories check_all="yes" realtime="yes">%USERPROFILE%\OneDrive</directories>
    <directories check_all="yes" realtime="yes">%USERPROFILE%\OneDrive - CMMC</directories>

    <!-- System integrity — drift here is a red flag. -->
    <directories check_all="yes">C:\Windows\System32\drivers</directories>
    <directories check_all="yes">C:\Program Files</directories>
    <directories check_all="yes">C:\Program Files (x86)</directories>

    <!-- Ignore noisy paths (agent self-updates, app caches). -->
    <ignore>C:\Program Files (x86)\ossec-agent</ignore>
    <ignore>C:\Windows\System32\winevt\Logs</ignore>
    <ignore type="sregex">.log$</ignore>
    <ignore type="sregex">.tmp$</ignore>
  </syscheck>

  <rootcheck>
    <disabled>no</disabled>
    <windows_apps>./shared/win_applications_rcl.txt</windows_apps>
    <windows_malware>./shared/win_malware_rcl.txt</windows_malware>
    <frequency>43200</frequency>
  </rootcheck>

  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>6h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
    <hotfixes>yes</hotfixes>
  </wodle>

  <!-- Active response intentionally NOT enabled. Turn on per-site
       with a deliberate policy review. -->

</ossec_config>
