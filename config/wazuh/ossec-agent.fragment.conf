<!--
  Wazuh agent fragment for the filebrowser-cmmc host.

  Merge into the agent's /var/ossec/etc/ossec.conf (NOT a full
  replacement — the stock file has agent-server credentials and
  other scaffolding you don't want to overwrite).

      sudo tee -a /var/ossec/etc/ossec.conf < ossec-agent.fragment.conf
      sudo systemctl restart wazuh-agent

  Two log sources get their own localfile block:

    1. filebrowser-cmmc itself. NewJSONEmitter writes one JSON
       object per line to stdout; the systemd unit routes stdout
       to journald under `_SYSTEMD_UNIT=cmmc-filebrowser.service`.
       Agent reads journald directly so there is no file rotation
       dependency.

    2. Keycloak audit events. Enable the jboss-logging event listener
       in the realm (config/keycloak/bootstrap.sh already does this)
       and Keycloak writes events to journald under the container's
       conmon unit.

  Both sources are JSON line-delimited; the decoder does the rest.

  FIPS: the agent's internal TLS to the manager inherits the OS
  FIPS posture. On a host with fips-mode-setup enabled, the agent's
  OpenSSL links against the FIPS-validated module.
-->

<ossec_config>

  <!-- filebrowser-cmmc audit stream. The trusted journald field is
       _SYSTEMD_UNIT (leading underscore); the unprefixed
       SYSTEMD_UNIT is the user-supplied variant and is not set by
       the daemon itself. Wrong field → silent drop of all events. -->
  <localfile>
    <log_format>json</log_format>
    <location>journald</location>
    <filter field="_SYSTEMD_UNIT">^cmmc-filebrowser\.service$</filter>
    <label key="@source">filebrowser-cmmc</label>
  </localfile>

  <!-- Keycloak event listener stream (if Keycloak runs on the
       same host; remove if Keycloak is elsewhere and ship its
       agent there). -->
  <localfile>
    <log_format>json</log_format>
    <location>journald</location>
    <filter field="_SYSTEMD_UNIT">^keycloak\.service$</filter>
    <label key="@source">keycloak-cmmc</label>
  </localfile>

  <!-- File integrity monitoring on the filebrowser runtime paths.
       The binary, envelope store, and audit marker directories
       should not change between upgrades; drift is a red flag. -->
  <syscheck>
    <frequency>3600</frequency>
    <scan_on_start>yes</scan_on_start>
    <directories check_all="yes" realtime="yes">/usr/local/bin/filebrowser</directories>
    <directories check_all="yes" realtime="yes">/etc/cmmc-filebrowser</directories>
    <directories check_all="yes">/opt/cmmc-filebrowser/branding</directories>
    <!-- DO NOT monitor /srv/files — CUI content changes constantly
         and FIM on it would flood SIEM. The audit chain already
         records every file op. -->
  </syscheck>

  <!-- Rootkit checks (default set from Wazuh agent; keep on). -->
  <rootcheck>
    <disabled>no</disabled>
    <check_unixaudit>yes</check_unixaudit>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
  </rootcheck>

</ossec_config>
